events {
    worker_connections 768;
}


http {
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        # HTTPS configuration
        listen 443 ssl;
        server_name keycloak.internal;
        
        # SSL certificate configuration
        ssl_certificate /etc/nginx/certs/keycloak/cert.pem;
        ssl_certificate_key /etc/nginx/certs/keycloak/key.pem;
        
        # SSL protocols and ciphers
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        
        # SSL session settings
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 10m;

        location / {
            proxy_pass https://127.0.0.1:6677;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
    }

    server {
        # HTTPS configuration
        listen 443 ssl;
        server_name secureweb.internal;
        
        # SSL certificate configuration
        ssl_certificate /etc/nginx/certs/secureweb/cert.pem;
        ssl_certificate_key /etc/nginx/certs/secureweb/key.pem;
        
        # SSL protocols and ciphers
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        
        # SSL session settings
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 10m;

        location / {
            proxy_pass http://127.0.0.1:13033;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        # HTTPS configuration
        listen 443 ssl;
        server_name nextcloud.internal;
        
        # SSL certificate configuration
        ssl_certificate /etc/nginx/certs/nextcloud/cert.pem;
        ssl_certificate_key /etc/nginx/certs/nextcloud/key.pem;
        
        # SSL protocols and ciphers
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        
        # SSL session settings
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 10m;

        location / {
            proxy_pass http://127.0.0.1:11000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;

        # For the federation port
        listen 8448 ssl default_server;
        listen [::]:8448 ssl default_server;

        # SSL certificate configuration
        ssl_certificate /etc/nginx/certs/chat/cert.pem;
        ssl_certificate_key /etc/nginx/certs/chat/key.pem;

        server_name chat.internal;

        location ~ ^(/_matrix|/_synapse/client) {
            # note: do not add a path (even a single /) after the port in `proxy_pass`,
            # otherwise nginx will canonicalise the URI and cause signature verification
            # errors.
            proxy_pass http://127.0.0.1:8008;
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $host:$server_port;

            # Nginx by default only allows file uploads up to 1M in size
            # Increase client_max_body_size to match max_upload_size defined in homeserver.yaml
            client_max_body_size 50M;
        
        # Synapse responses may be chunked, which is an HTTP/1.1 feature.
        proxy_http_version 1.1;
        }
    }

}